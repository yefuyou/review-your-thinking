<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-labelledby="title desc">
  <title id="title">Thinking Partner</title>
  <desc id="desc">温暖的编辑风时间线，展示会话证据如何成为待确认、再由用户确认的思维模型。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8E5A7D"/>
    </marker>
  </defs>

  <rect width="1200" height="440" rx="28" fill="#FFF9EF"/>
  <rect x="1" y="1" width="1198" height="438" rx="27" fill="none" stroke="#E8D8C8" stroke-width="2"/>
  <circle cx="1090" cy="52" r="124" fill="#F7B7C8" opacity="0.22"/>
  <circle cx="1142" cy="386" r="136" fill="#F4C84A" opacity="0.15"/>
  <path d="M 548 42 C 602 94, 574 168, 626 214 C 668 252, 630 332, 682 394" fill="none" stroke="#B8A6C9" stroke-width="2" stroke-dasharray="5 10"/>

  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Microsoft YaHei, PingFang SC, Noto Sans SC, Arial, sans-serif">
    <rect x="68" y="62" width="204" height="34" rx="17" fill="#FFFFFF" stroke="#E8D8C8"/>
    <circle cx="90" cy="79" r="6" fill="#E97862"/>
    <text x="106" y="84" font-size="13" font-weight="700" letter-spacing="1" fill="#8E5A7D">长期 AI 对话 · 自我复盘</text>

    <text x="68" y="184" font-size="62" font-weight="720" letter-spacing="-2" fill="#1F2430">Thinking Partner</text>
    <text x="68" y="235" font-size="26" font-weight="500" fill="#6B6470">复盘你的思维是如何变化的</text>

    <rect x="68" y="292" width="414" height="74" rx="16" fill="#FFFFFF" stroke="#E8D8C8"/>
    <rect x="68" y="292" width="8" height="74" rx="4" fill="#F4C84A"/>
    <text x="96" y="322" font-size="13" font-weight="700" letter-spacing="1" fill="#8E5A7D">核心原则</text>
    <text x="96" y="348" font-size="16" font-weight="600" fill="#1F2430">只有你确认后，思维模型才会进入长期画像。</text>

    <path d="M 688 112 C 732 112, 726 204, 770 204" fill="none" stroke="#8E5A7D" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M 770 246 C 728 246, 734 334, 690 334" fill="none" stroke="#8E5A7D" stroke-width="2.5" marker-end="url(#arrow)"/>

    <g>
      <rect x="638" y="62" width="390" height="100" rx="18" fill="#FFFFFF" stroke="#E8D8C8"/>
      <circle cx="668" cy="92" r="11" fill="#F4C84A"/>
      <text x="692" y="97" font-size="13" font-weight="750" letter-spacing="1" fill="#8E5A7D">OBSERVED · 可定位</text>
      <text x="668" y="128" font-size="18" font-weight="650" fill="#1F2430">一个问题、假设或张力</text>
      <text x="668" y="149" font-size="14" fill="#6B6470">来自明确保存的会话记录</text>
    </g>

    <g>
      <rect x="770" y="178" width="350" height="100" rx="18" fill="#FFFDF8" stroke="#F7B7C8" stroke-width="2"/>
      <circle cx="800" cy="208" r="11" fill="#F7B7C8"/>
      <text x="824" y="213" font-size="13" font-weight="750" letter-spacing="1" fill="#8E5A7D">PROPOSED · 待确认</text>
      <text x="800" y="244" font-size="18" font-weight="650" fill="#1F2430">一个更清楚的工作模型</text>
      <text x="800" y="265" font-size="14" fill="#6B6470">等待用户检查和修改</text>
    </g>

    <g>
      <rect x="638" y="294" width="390" height="100" rx="18" fill="#FFFFFF" stroke="#B8A6C9" stroke-width="2"/>
      <circle cx="668" cy="324" r="11" fill="#B8A6C9"/>
      <text x="692" y="329" font-size="13" font-weight="750" letter-spacing="1" fill="#8E5A7D">CONFIRMED · 由你确认</text>
      <text x="668" y="360" font-size="18" font-weight="650" fill="#1F2430">可继续修订的 Thinking Profile</text>
      <text x="668" y="381" font-size="14" fill="#6B6470">不是 AI 对用户的人格判断</text>
    </g>
  </g>
</svg>
